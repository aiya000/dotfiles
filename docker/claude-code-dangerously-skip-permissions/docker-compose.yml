services:
  claude-code:
    build:
      dockerfile_inline: |
        FROM node:lts-slim
        RUN \
          apt-get update \
          && apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            ncurses-base \
            ncurses-bin \
            git \
            gh \
            sudo \
            ripgrep \
            fd-find \
          && ln -s /usr/bin/fdfind /usr/local/bin/fd \
          && echo "node ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/node \
          && chmod 0440 /etc/sudoers.d/node \
          && rm -rf /var/lib/apt/lists/*
        USER node
        RUN \
          echo 'export PATH="$HOME/.local/bin:$PATH"' >> ~/.bashrc \
          && sudo npm install -g @anthropic-ai/claude-code \
          && claude install \
          && sudo npm uninstall -g @anthropic-ai/claude-code
        RUN mkdir -p /home/node/.ai-memory
        ENV PATH="/home/node/.local/bin:$PATH"
        ENV CLAUDE_CONFIG_DIR=/home/node/.claude
        ENV TERM=xterm-256color
        WORKDIR /workspace
    volumes:
      - "$HOME/.claude:/home/node/.claude"
      - "$HOME/.claude.json:/home/node/.claude.json"
      - "$HOME/.dotfiles:/home/aiya000/.dotfiles:ro"
      - "$DOTFILES_AI_MEMORY_DIR:/home/node/.ai-memory"
    environment:
      - CLAUDE_CONFIG_DIR=/home/node/.claude
      - DOTFILES_AI_MEMORY_DIR=/home/node/.ai-memory
    working_dir: /workspace
    stdin_open: true
    tty: true
    # command: ["/home/node/.local/bin/claude", "--dangerously-skip-permissions"]
    command: ["claude", "--dangerously-skip-permissions"]
